name: FDE-Feed Update

on:
  schedule:
    # Every 2 days at 9:00 AM UTC
    - cron: '0 9 */2 * *'
  workflow_dispatch:
    inputs:
      force_refresh:
        description: 'Force refresh all sources'
        required: false
        default: 'false'

jobs:
  update-feed:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4 feedparser python-dateutil
        
    - name: Run FDE-Feed fetcher
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: python scripts/fetch_feed.py
      
    - name: Generate README
      run: python scripts/generate_readme.py
      
    - name: Commit and push
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add -A
        timestamp=$(date -u +"%Y-%m-%d %H:%M:%S UTC")
        git commit -m "Update FDE Brief: $timestamp" || exit 0
        git push
